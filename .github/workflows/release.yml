# Release pipeline for tabbify-service-mesh.
#
# Builds the three mesh binaries as fully static Linux executables
# (x86_64 + aarch64, musl) and uploads them to S3 alongside the
# one-command installer (mesh/install == bootstrap.sh), so a fresh
# systemd Linux host joins the mesh with a single curl | sh.
#
# ---------------------------------------------------------------------------
# REQUIRED REPO CONFIGURATION (Settings -> Secrets and variables -> Actions)
# ---------------------------------------------------------------------------
# Secrets:
#   AWS_ROLE_ARN        IAM role to assume via GitHub OIDC. The role's trust
#                       policy must allow this repo's GitHub OIDC provider,
#                       and its permission policy must grant s3:PutObject on
#                       the release bucket (e.g. arn:aws:s3:::<bucket>/mesh/*).
#
# Variables:
#   AWS_REGION          AWS region of the bucket, e.g. eu-central-1.
#   RELEASE_S3_BUCKET   Target bucket name (no s3:// prefix), e.g. tabbify-mesh-releases.
#
# ONE-TIME AWS SETUP (done by the repo owner, outside this workflow):
#   1. Create a GitHub OIDC identity provider in IAM:
#        Provider URL: https://token.actions.githubusercontent.com
#        Audience:     sts.amazonaws.com
#   2. Create an IAM role whose trust policy federates that provider and
#      restricts `token.actions.githubusercontent.com:sub` to this repo
#      (e.g. "repo:leontij/tabbify-service-mesh:*").
#   3. Attach a permission policy granting s3:PutObject (and optionally
#      s3:PutObjectAcl if you upload with --acl) on the bucket's mesh/ prefix.
#   4. Put the role ARN in the AWS_ROLE_ARN secret and the bucket/region in
#      the variables above.
#
# ALTERNATIVE — static access keys instead of OIDC:
#   If you prefer not to set up an OIDC provider, replace the
#   `role-to-assume` line in the "Configure AWS credentials" step with:
#       aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
#       aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
#   and drop the `permissions:` block below (OIDC is the only thing that
#   needs `id-token: write`). Keep the IAM user's policy scoped to
#   s3:PutObject on the bucket's mesh/ prefix.
# ---------------------------------------------------------------------------

name: release

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"

# Serialize release runs: two concurrent SSM redeploys raced docker
# compose mid-recreate on the serving box (2026-06-04: containers left
# Created-but-not-started, public API 504 until manual compose up).
# One release at a time; a newer queued run supersedes an older queued
# one (latest wins), the RUNNING one is never cancelled mid-deploy.
concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    # musl gives us static binaries that run on any modern Linux without a
    # matching libc; both arches cross-compile on one x86_64 runner via
    # cargo-zigbuild (zig supplies the cross-linker), mirroring the
    # supervisor release pipeline. The coordinator container + redeploy
    # steps run on the x86_64 leg only.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: aarch64
    runs-on: ubuntu-latest

    # `id-token: write` is required for the OIDC handshake with AWS STS.
    # `contents: read` is the minimum needed to check out the repo.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Install zig (cross-linker for cargo-zigbuild)
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-zig-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-zig-${{ matrix.target }}-

      - name: Build static release binaries
        # cargo-zigbuild cross-links the musl C runtime for both targets
        # from one x86_64 runner. The three binary-producing packages are
        # tabbify-mesh-coordinator, tabbify-mesh and tabbify-mesh-ca.
        run: cargo zigbuild --release --target "${{ matrix.target }}" --bin tabbify-mesh --bin tabbify-mesh-coordinator --bin tabbify-mesh-ca

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # OIDC: no long-lived keys stored in the repo. See header for the
          # access-key alternative if OIDC is not set up.
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload binaries and the installer to S3
        # Legacy overwrite-latest keys (compat aliases, x86_64 only) + the
        # one-command installer (mesh/install) + versioned layout
        # (<family>/v<SEMVER>/<arch>/<binaries> + sibling `latest` manifest)
        # when building a v* tag. Old hosts keep reading mesh/<bin>; the
        # self-updater reads mesh/v<SEMVER>/... + mesh/latest (spec P0).
        env:
          BUCKET: ${{ vars.RELEASE_S3_BUCKET }}
        run: |
          set -euo pipefail
          BIN_DIR="target/${{ matrix.target }}/release"
          DEST="s3://${BUCKET}/mesh"
          ARCH="${{ matrix.arch }}"

          if [ "${ARCH}" = "x86_64" ]; then
            # 1) LEGACY overwrite-latest keys (compatibility aliases).
            for bin in tabbify-mesh-coordinator tabbify-mesh tabbify-mesh-ca; do
              echo "Uploading legacy alias ${bin}..."
              aws s3 cp "${BIN_DIR}/${bin}" "${DEST}/${bin}"
            done
            # The one-command installer (curl -fsSL .../mesh/install | sh).
            echo "Uploading installer..."
            aws s3 cp bootstrap.sh "${DEST}/bootstrap.sh" --content-type text/x-shellscript
            aws s3 cp bootstrap.sh "${DEST}/install"      --content-type text/x-shellscript
          fi

          # 2) VERSIONED layout — only on a v* tag (SEMVER source = git tag).
          REF="${GITHUB_REF#refs/tags/}"
          case "${GITHUB_REF}" in
            refs/tags/v*)
              SEMVER="${REF}"   # e.g. v1.4.0
              VDEST="${DEST}/${SEMVER}/${ARCH}"
              echo "Uploading versioned binaries to ${VDEST}..."
              aws s3 cp "${BIN_DIR}/tabbify-mesh"    "${VDEST}/tabbify-mesh"
              aws s3 cp "${BIN_DIR}/tabbify-mesh-ca" "${VDEST}/tabbify-mesh-ca"
              ;;
            *)
              echo "Not a v* tag (${GITHUB_REF}) — skipping versioned upload."
              ;;
          esac

      # The coordinator (pure HTTP, no TUN) also ships as a container image for
      # the service host. joiner/CA stay as S3 binaries above (host TUN). The
      # Dockerfile wraps the static musl binary built above into distroless.
      - name: Log in to Amazon ECR
        if: matrix.arch == 'x86_64'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push coordinator image
        if: matrix.arch == 'x86_64'
        run: |
          set -euo pipefail
          IMAGE="${{ steps.ecr.outputs.registry }}/tabbify-coordinator"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${GITHUB_SHA::7}" .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${GITHUB_SHA::7}"

      # `:latest`/`:<sha>` are mutable tags and may not be readable immediately
      # after push (ECR eventual consistency). Resolve the immutable content
      # digest for the SHA tag — with a retry loop — and GATE the redeploy on
      # it: if no digest is confirmed this step fails and the SSM redeploy below
      # never runs (closes bug#3, the redeploy race on a mutable tag).
      - name: Confirm coordinator image digest
        if: matrix.arch == 'x86_64'
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          REPO_URI="${REGISTRY}/tabbify-coordinator"
          ENV_FILE="$(mktemp)"
          bash scripts/confirm-ecr-digest.sh \
            "${REPO_URI}" "${GITHUB_SHA::7}" "${ENV_FILE}" TABBIFY_COORDINATOR_IMAGE
          # Surface the confirmed `repo@digest` to later steps so the SSM
          # redeploy can pin it into /opt/tabbify/.env.
          grep '^TABBIFY_COORDINATOR_IMAGE=' "${ENV_FILE}" >> "${GITHUB_ENV}"

      # A new ECR image is useless until the running container pulls it. Trigger
      # the redeploy on the host via SSM send-command — no SSH, no static keys
      # (the instance role carries SSM managed-node perms; this CI role carries
      # ssm:SendCommand, both via terraform). Closes the gap where pushed images
      # never reached the running coordinator.
      - name: Redeploy coordinator via SSM
        if: matrix.arch == 'x86_64'
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          # Confirmed `repo@digest` from the digest-confirm step above. This
          # step only runs after that gate passed, so the value is always set.
          COORDINATOR_IMAGE: ${{ env.TABBIFY_COORDINATOR_IMAGE }}
        run: |
          set -euo pipefail
          # NOTE: SSM AWS-RunShellScript runs this with /bin/sh (dash on
          # Ubuntu), so it must be POSIX — no `pipefail`. `set -e` still aborts
          # on a failed `docker login` (empty creds -> login fails -> exit).
          # We pin TABBIFY_COORDINATOR_IMAGE to the confirmed immutable digest
          # in /opt/tabbify/.env; compose references ${TABBIFY_COORDINATOR_IMAGE:-<default>}
          # (fallback added by the infra lane), so the host pulls the exact
          # digest CI confirmed rather than the mutable :latest tag.
          DEPLOY_SCRIPT=$(cat <<EOF
          set -eu
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${REGISTRY}
          cd /opt/tabbify
          touch .env
          grep -v '^TABBIFY_COORDINATOR_IMAGE=' .env > .env.next || true
          printf 'TABBIFY_COORDINATOR_IMAGE=%s\n' "${COORDINATOR_IMAGE}" >> .env.next
          mv .env.next .env
          docker compose pull && docker compose up -d
          EOF
          )
          CMD_ID=$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --document-name AWS-RunShellScript \
            --targets "Key=tag:Name,Values=tabbify-coordinator" \
            --comment "redeploy ${GITHUB_SHA::7}" \
            --parameters "$(jq -n --arg s "$DEPLOY_SCRIPT" '{commands:[$s]}')" \
            --query Command.CommandId --output text)
          echo "SSM CommandId=${CMD_ID}"
          for _ in $(seq 1 30); do
            sleep 10
            STATUS=$(aws ssm list-command-invocations --region "${AWS_REGION}" \
              --command-id "${CMD_ID}" --details \
              --query "CommandInvocations[0].Status" --output text 2>/dev/null || echo Pending)
            echo "redeploy status: ${STATUS}"
            case "${STATUS}" in
              Success) echo "coordinator redeployed"; exit 0 ;;
              Failed|Cancelled|TimedOut|"Delivery Timed Out")
                echo "redeploy ended: ${STATUS}"
                aws ssm list-command-invocations --region "${AWS_REGION}" --command-id "${CMD_ID}" \
                  --details --query "CommandInvocations[0].CommandPlugins[0].Output" --output text || true
                exit 1 ;;
            esac
          done
          echo "timed out waiting for SSM redeploy"; exit 1

  # `latest` is published ONLY after BOTH arch legs uploaded their versioned
  # binaries (needs: the whole matrix), closing the release-window 404 for
  # aarch64 installs. Publishes the plain (x86_64, historical) sha keys plus
  # `<bin>_aarch64` for the arch-aware installer. Compact JSON (-c): the
  # installers grep with no-whitespace patterns. TAG-PUSH ONLY.
  publish-latest:
    needs: build-and-release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Publish mesh/latest manifest (all arches present)
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME}"
          BUCKET="${{ vars.RELEASE_S3_BUCKET }}"
          mkdir -p /tmp/rel
          for arch in x86_64 aarch64; do
            for bin in tabbify-mesh tabbify-mesh-ca; do
              aws s3 cp "s3://${BUCKET}/mesh/${V}/${arch}/${bin}" "/tmp/rel/${bin}.${arch}"
            done
          done
          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -nc \
            --arg v "$V" --arg ts "$TS" \
            --arg mesh_x "$(sha256sum /tmp/rel/tabbify-mesh.x86_64     | cut -d' ' -f1)" \
            --arg ca_x   "$(sha256sum /tmp/rel/tabbify-mesh-ca.x86_64  | cut -d' ' -f1)" \
            --arg mesh_a "$(sha256sum /tmp/rel/tabbify-mesh.aarch64    | cut -d' ' -f1)" \
            --arg ca_a   "$(sha256sum /tmp/rel/tabbify-mesh-ca.aarch64 | cut -d' ' -f1)" \
            '{latest:$v, versions:[$v],
              sha256:{"tabbify-mesh":$mesh_x, "tabbify-mesh-ca":$ca_x,
                      "tabbify-mesh_aarch64":$mesh_a, "tabbify-mesh-ca_aarch64":$ca_a},
              ts:$ts}' > /tmp/latest.json
          aws s3 cp /tmp/latest.json "s3://${BUCKET}/mesh/latest" --content-type application/json
          echo "published:"; cat /tmp/latest.json
